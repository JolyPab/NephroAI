<div class="upload-page">
  <div class="upload-title-row glass glass-strong">
    <div class="upload-title-left">
      <span class="material-symbols-rounded upload-title-icon">upload_file</span>
      <div>
        <p class="upload-kicker">Importación</p>
        <h2 class="upload-title-name">{{ 'UPLOAD.TITLE' | translate }}</h2>
      </div>
    </div>
    <span class="upload-title-badge">PDF</span>
  </div>

  <section class="upload-card glass glass-strong">
    <div
      class="upload-dropzone"
      [class.upload-dropzone--active]="isDragging"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
    >
      <label class="upload-dropzone__label">
        <span class="material-symbols-rounded upload-dropzone__icon">cloud_upload</span>
        <span class="upload-dropzone__title">{{ 'UPLOAD.DROP_TITLE' | translate }}</span>
        <span class="upload-dropzone__hint">{{ 'UPLOAD.DROP_HINT' | translate }}</span>
        <button type="button" class="upload-action-btn" [disabled]="isUploading" (click)="fileInput.click()">
          <span class="material-symbols-rounded">folder_open</span>
          {{ 'UPLOAD.CHOOSE_FILE' | translate }}
        </button>
        <input
          #fileInput
          type="file"
          accept="application/pdf"
          class="hidden"
          [disabled]="isUploading"
          (change)="onFileSelected($event)"
        />
      </label>
    </div>

    <div *ngIf="selectedFile" class="selected-file glass glass-soft">
      <span class="material-symbols-rounded">description</span>
      <span>{{ selectedFile.name }}</span>
      <button type="button" [disabled]="isUploading" (click)="clearSelection()" title="Quitar archivo">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>

    <div *ngIf="uploadMessage" class="upload-toast upload-toast--success" role="status">
      <span class="material-symbols-rounded">check_circle</span>
      <span>{{ uploadMessage }}</span>
    </div>
    <div *ngIf="errorMessage" class="upload-toast upload-toast--error" role="alert">
      <span class="material-symbols-rounded">error</span>
      <span>{{ errorMessage }}</span>
    </div>

    <div class="upload-hint glass glass-soft" role="note">
      <span class="material-symbols-rounded">info</span>
      <span>{{ uploadAccuracyHint }}</span>
    </div>

    <button type="button" class="upload-submit" (click)="submit()" [disabled]="isUploading">
      <span *ngIf="isUploading" class="loader-dot"></span>
      <span class="material-symbols-rounded" *ngIf="!isUploading">auto_awesome</span>
      <span>{{ isUploading ? ('UPLOAD.PROCESSING' | translate) : ('UPLOAD.UPLOAD_PARSE' | translate) }}</span>
    </button>
  </section>
</div>
