<div class="otp-root" [class.otp-disabled]="disabled">
  <input
    #otpBox
    *ngFor="let i of indices"
    type="text"
    inputmode="numeric"
    pattern="[0-9]*"
    maxlength="1"
    autocomplete="one-time-code"
    class="otp-box"
    [disabled]="disabled"
    (input)="onInput($event, i)"
    (keydown)="onKeydown($event, i)"
    (paste)="onPaste($event, i)"
    (focus)="onFocus($event)"
  />
</div>
