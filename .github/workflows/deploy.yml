name: Deploy to Server

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest backend/tests -v

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=moderate

      - name: Upload frontend build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/medic-frontend
          if-no-files-found: error

  docker-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Build backend image
        run: docker build -t nephroai-api-ci .

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend-tests
      - frontend-build
      - docker-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/medic-frontend

      - name: Copy app files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "Dockerfile,docker-compose.yml,nginx.conf,livekit.yaml,backend/**,frontend/dist/medic-frontend/**,landing/**"
          target: "~/medic"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/medic
            cd ~/medic
            set -a
            [ -f .env ] && . ./.env
            set +a
            cat > livekit.yaml <<EOF
            port: 7880
            rtc:
              node_ip: ${LIVEKIT_NODE_IP:-209.50.54.90}
              use_external_ip: false
              tcp_port: 7881
              udp_port: 7882
            redis:
              address: redis:6379
            keys:
              ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-nephroai-dev-livekit-secret-2026-local}
            logging:
              level: info
            EOF
            docker compose up -d --build
            docker compose ps
            docker compose exec -T api python -c 'import os; raise SystemExit(0 if (os.getenv("JWT_SECRET") or os.getenv("SECRET_KEY")) else "JWT_SECRET/SECRET_KEY is not visible inside api container")'
            curl -fsS http://localhost/api/health
            docker compose logs --tail=80 api worker

      - name: Public health check
        run: curl -fsS https://app.nephroai.ec/api/health
